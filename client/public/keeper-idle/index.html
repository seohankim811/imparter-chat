  if(m.section==='browse'){
    h+=`<div class="market-filter">
      <button class="${m.filter==='all'?'active':''}" onclick="mpData.market.filter='all';renderMP()">전체</button>
      <button class="${m.filter==='lumen'?'active':''}" onclick="mpData.market.filter='lumen';renderMP()">루멘</button>
      <button class="${m.filter==='stars'?'active':''}" onclick="mpData.market.filter='stars';renderMP()">별빛</button>
    </div>`;
    const listings=(m.listings||[]).filter(l=>m.filter==='all'||l.type===m.filter);
    if(listings.length===0){
      h+='<div style="text-align:center;color:var(--text-dim);padding:20px;">거래가 없어요</div>';
    }
    listings.forEach(l=>{
      const isMine=l.seller_pid===myPid;
      const typeLabel=l.type==='lumen'?'루멘':'별빛';
      const typeColor=l.type==='lumen'?'var(--gold)':'var(--purple)';
      h+=`<div class="market-listing">
        <div class="mli">
          <div class="mitem">${fmt(l.amount||0)} <span style="color:${typeColor};">${typeLabel}</span></div>
          <div class="mseller">판매자: ${escapeHTML(l.seller_name||'?')}</div>
          <div class="mprice">${l.price_lumen?fmt(l.price_lumen)+'💰':''}${l.price_stars?' '+l.price_stars+'⭐':''}</div>
        </div>
        ${isMine?'<span style="font-size:10px;color:var(--text-dim);">내 물품</span>':`<button class="market-btn buy" onclick="buyMarketListing('${l.id}')">구매</button>`}
      </div>`;
    });
  } else if(m.section==='mine'){
    const mine=(m.listings||[]).filter(l=>l.seller_pid===myPid);
    if(mine.length===0){
      h+='<div style="text-align:center;color:var(--text-dim);padding:20px;">등록한 물품이 없어요</div>';
    }
    mine.forEach(l=>{
      const typeLabel=l.type==='lumen'?'루멘':'별빛';
      const typeColor=l.type==='lumen'?'var(--gold)':'var(--purple)';
      h+=`<div class="market-listing">
        <div class="mli">
          <div class="mitem">${fmt(l.amount||0)} <span style="color:${typeColor};">${typeLabel}</span></div>
          <div class="mprice">${l.price_lumen?fmt(l.price_lumen)+'💰':''}${l.price_stars?' '+l.price_stars+'⭐':''}</div>
        </div>
        <button class="market-btn cancel" onclick="cancelMarketListing('${l.id}')">취소</button>
      </div>`;
    });
  } else if(m.section==='sell'){
    h+=`<div class="market-form">
      <div style="font-family:'Do Hyeon';font-size:14px;color:var(--green);margin-bottom:8px;">💱 판매 등록</div>
      <div class="row">
        <label>판매 종류:</label>
        <select id="mktType"><option value="lumen">루멘</option><option value="stars">별빛</option></select>
      </div>
      <div class="row">
        <label>수량:</label>
        <input type="number" id="mktAmount" value="10000" min="1" style="width:120px;">
      </div>
      <div class="row">
        <label>가격 (루멘):</label>
        <input type="number" id="mktPriceL" value="0" min="0" style="width:120px;">
      </div>
      <div class="row">
        <label>가격 (별빛):</label>
        <input type="number" id="mktPriceS" value="1" min="0" style="width:60px;">
      </div>
      <button class="qc-claim" style="width:100%;padding:8px;margin-top:4px;" onclick="listMarketItem()">등록하기</button>
    </div>`;
  }
  return h;
}
function fetchMarket(){
  fetch('/api/market').then(r=>r.json()).then(d=>{
    mpData.market.listings=d.listings||[];
    if(currentTab==='mp'&&mpSubTab==='market')renderMP();
  }).catch(()=>{});
}
function listMarketItem(){
  const type=document.getElementById('mktType').value;
  const amount=parseInt(document.getElementById('mktAmount').value)||0;
  const priceL=parseInt(document.getElementById('mktPriceL').value)||0;
  const priceS=parseInt(document.getElementById('mktPriceS').value)||0;
  if(amount<=0){showToast('수량을 입력하세요');return;}
  if(priceL<=0&&priceS<=0){showToast('가격을 입력하세요');return;}
  if(type==='lumen'&&state.lumen<amount){showToast('루멘 부족');return;}
  if(type==='stars'&&state.stars<amount){showToast('별빛 부족');return;}
  fetch('/api/market/list',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({pid:myPid,type,amount,price_lumen:priceL,price_stars:priceS})}).then(r=>r.json()).then(d=>{
    if(d.ok||d.success||d.id){
      if(type==='lumen')state.lumen-=amount;else state.stars-=amount;
      updateTopBar();saveGame();
      showToast('✅ 거래소 등록 완료!');
      fetchMarket();
      mpData.market.section='mine';
      renderMP();
    } else showToast(d.error||'등록 실패');
  }).catch(()=>showToast('등록 실패'));
}
function buyMarketListing(id){
  fetch('/api/market/buy',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({pid:myPid,listing_id:id})}).then(r=>r.json()).then(d=>{
    if(d.ok||d.success){
      showToast('🛒 구매 완료!');
      fetchMarket();
      syncToServer();
    } else showToast(d.error||'구매 실패');
  }).catch(()=>showToast('구매 실패'));
}
function cancelMarketListing(id){
  fetch('/api/market/cancel',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({pid:myPid,listing_id:id})}).then(r=>r.json()).then(d=>{
    if(d.ok||d.success){
      showToast('거래 취소됨');
      fetchMarket();
      syncToServer();
    } else showToast(d.error||'취소 실패');
  }).catch(()=>showToast('취소 실패'));
}

function escapeHTML(str){
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function sendChat(){
  const input=document.getElementById('chatInput');
  if(!input)return;
  const msg=input.value.trim();
  if(!msg||!myPid)return;
  input.value='';
  fetch('/api/chat',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({pid:myPid,msg:msg})
  }).then(r=>r.json()).then(()=>{
    fetchChat();
  }).catch(()=>{});
}

// =====================================================
// VISIT OTHER PLAYERS
// =====================================================
function visitPlayer(pid){
  if(pid===myPid)return;
  fetch('/api/visit/'+pid).then(r=>r.json()).then(d=>{
    if(!d.found){showToast('플레이어를 찾을 수 없어요');return;}
    showVisitView(d);
  }).catch(()=>showToast('연결 실패'));
}

function showVisitView(data){
  document.getElementById('visitTitle').textContent=data.nickname+'의 도시 방문중';
  const body=document.getElementById('visitBody');

  let html=`<div class="visit-stats">
    <div class="visit-stat"><div class="visit-stat-val">${fmt(data.totalLumen)}</div><div class="visit-stat-label">총 루멘</div></div>
    <div class="visit-stat"><div class="visit-stat-val">${data.stars}</div><div class="visit-stat-label">별빛</div></div>
    <div class="visit-stat"><div class="visit-stat-val">${(data.buildingLevels||[]).reduce((a,b)=>a+b,0)}</div><div class="visit-stat-label">건물합</div></div>
  </div>`;

  // Show their buildings as mini cards
  html+='<div style="font-family:Do Hyeon;font-size:14px;color:var(--green);margin-bottom:8px;">건물</div>';
  BUILDINGS.forEach((b,i)=>{
    const bl=data.buildingLevels&&data.buildingLevels[i]?data.buildingLevels[i]:0;
    const unlocked=data.buildings&&data.buildings[i]?data.buildings[i].unlocked:false;
    html+=`<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;margin-bottom:4px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;">
      <div style="font-size:20px;">${b.icon}</div>
      <div style="flex:1;"><div style="font-family:Do Hyeon;font-size:13px;color:#fff;">${b.name}</div></div>
      <div style="font-family:Do Hyeon;font-size:13px;color:${unlocked?'var(--green)':'#555'};">${unlocked?'Lv.'+bl:'잠김'}</div>
    </div>`;
  });

  // Characters
  html+='<div style="font-family:Do Hyeon;font-size:14px;color:var(--purple);margin:12px 0 8px;">캐릭터</div>';
  CHARACTERS.forEach((c,i)=>{
    const recruited=data.characters&&data.characters[i]?data.characters[i].recruited:false;
    const lv=data.characters&&data.characters[i]?data.characters[i].level:0;
    html+=`<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;margin-bottom:3px;background:rgba(255,255,255,0.02);border-radius:6px;">
      <div style="font-size:18px;opacity:${recruited?1:0.3};">${c.icon}</div>
      <div style="flex:1;font-size:12px;color:${recruited?c.color:'#555'};">${c.full}</div>
      <div style="font-size:11px;color:${recruited?'var(--green)':'#444'};font-family:Do Hyeon;">${recruited?'Lv.'+lv:'미모집'}</div>
    </div>`;
  });

  body.innerHTML=html;
  document.getElementById('visitOverlay').classList.add('show');
}

function closeVisit(){
  document.getElementById('visitOverlay').classList.remove('show');
}

// =====================================================
// GIFT SYSTEM
// =====================================================
function openGift(pid,nickname){
  giftTarget={pid,nickname};
  document.getElementById('giftTo').textContent=nickname+'에게 루멘 선물';
  const amounts=[10,50,100,500,1000];
  const div=document.getElementById('giftAmounts');
  div.innerHTML='';
  amounts.forEach(a=>{
    const btn=document.createElement('button');
    btn.className='gift-amt';
    btn.textContent=fmt(a);
    btn.disabled=state.lumen<a;
    btn.onclick=()=>sendGift(a);
    div.appendChild(btn);
  });
  document.getElementById('giftPopup').classList.add('show');
}

function closeGift(){
  document.getElementById('giftPopup').classList.remove('show');
  giftTarget=null;
}

function sendGift(amount){
  if(!giftTarget||!myPid)return;
  fetch('/api/gift',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({from_pid:myPid,to_pid:giftTarget.pid,amount:amount})
  }).then(r=>r.json()).then(d=>{
    if(d.error){showToast(d.error);return;}
    state.lumen=d.remaining;
    updateTopBar();saveGame();
    showToast('💝 '+giftTarget.nickname+'에게 '+fmt(amount)+' 루멘 선물!');
    closeGift();
  }).catch(()=>showToast('연결 실패'));
}

// =====================================================

// =====================================================
loadGame();recalcBonuses();initPlayerHp();renderCity();updateTopBar();
checkLogin();
setInterval(gameLoop,100);
setInterval(saveGame,30000);
setInterval(()=>{if(currentTab==='city')renderCity();if(currentTab==='adventure'&&advSubTab==='dungeon')renderAdventure();},2000);
setInterval(updateTopBar,1000);
</script>
