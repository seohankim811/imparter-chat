];
const RARITY_TIERS=[
  {id:'normal',name:'일반',color:'#aaa',cls:'rarity-normal',weight:50},
  {id:'uncommon',name:'고급',color:'#66cc66',cls:'rarity-uncommon',weight:30},
  {id:'rare',name:'희귀',color:'#6699ff',cls:'rarity-rare',weight:14},
  {id:'epic',name:'영웅',color:'#bb77ff',cls:'rarity-epic',weight:5},
  {id:'legend',name:'전설',color:'#ffcc33',cls:'rarity-legend',weight:1},
];
const EQUIP_NAMES={
  weapon:['단검','장검','마법봉','활','도끼','창','지팡이'],
  armor:['가죽 갑옷','체인 메일','판금 갑옷','로브','망토','미스릴 갑옷'],
  accessory:['반지','목걸이','귀걸이','팔찌','부적','브로치'],
  rune:['화염 룬','빙결 룬','번개 룬','대지 룬','빛의 룬','어둠 룬'],
};
const EQUIP_EMOJIS={weapon:['🗡','⚔','🪄','🏹','🪓','🔱','✨'],armor:['🦺','⛓','🛡','👘','🧥','💎'],accessory:['💍','📿','✨','⌚','🧿','💠'],rune:['🔥','❄','⚡','🌍','✨','🌑']};
let equipIdCounter=Date.now();
function generateEquipment(floor){
  const slotIdx=Math.floor(Math.random()*4);
  const slot=EQUIP_SLOTS[slotIdx];
  // Rarity based on floor
  let weights=[...RARITY_TIERS.map(r=>r.weight)];
  // Higher floors shift rarity up
  const floorBonus=Math.min(floor*0.3,30);
  weights[0]=Math.max(5,weights[0]-floorBonus);
  weights[1]+=floorBonus*0.3;weights[2]+=floorBonus*0.3;weights[3]+=floorBonus*0.2;weights[4]+=floorBonus*0.2;
  const totalW=weights.reduce((a,b)=>a+b,0);let roll=Math.random()*totalW;
  let rarityIdx=0;for(let i=0;i<weights.length;i++){roll-=weights[i];if(roll<=0){rarityIdx=i;break;}}
  const rarity=RARITY_TIERS[rarityIdx];
  const names=EQUIP_NAMES[slot.id];const emojis=EQUIP_EMOJIS[slot.id];
  const ni=Math.floor(Math.random()*names.length);
  const prefix=rarityIdx>=3?['빛나는 ','고대의 ','전설의 ','축복받은 '][Math.floor(Math.random()*4)]:'';
  const statMulti=(1+rarityIdx*0.6)*(1+floor*0.02);
  const stats={};
  const possibleStats=['atk','def','hp','crit','loot'];
  const numStats=1+Math.min(rarityIdx,3);
  const chosen=[];while(chosen.length<numStats){const s=possibleStats[Math.floor(Math.random()*possibleStats.length)];if(!chosen.includes(s))chosen.push(s);}
  chosen.forEach(s=>{
    switch(s){
      case'atk':stats.atk=Math.floor((10+Math.random()*20)*statMulti);break;
      case'def':stats.def=Math.floor((5+Math.random()*15)*statMulti);break;
      case'hp':stats.hp=Math.floor((50+Math.random()*100)*statMulti);break;
      case'crit':stats.crit=Math.round((2+Math.random()*5)*Math.min(statMulti,5)*10)/10;break;
      case'loot':stats.loot=Math.round((3+Math.random()*7)*Math.min(statMulti,4)*10)/10;break;
    }
  });
  return{id:++equipIdCounter,slot:slot.id,name:prefix+names[ni],rarity:rarity.id,rarityName:rarity.name,rarityColor:rarity.color,rarityCls:rarity.cls,
    emoji:emojis[ni%emojis.length],stats,floor};
}
function getEquipPower(){
  let p=0;const eq=state.combat.equipped;
  ['weapon','armor','accessory','rune'].forEach(slot=>{
    if(eq[slot]!=null){const item=state.combat.equipment.find(e=>e.id===eq[slot]);if(item){
      if(item.stats.atk)p+=item.stats.atk*3;if(item.stats.def)p+=item.stats.def*2;
      if(item.stats.hp)p+=item.stats.hp*0.5;if(item.stats.crit)p+=item.stats.crit*10;if(item.stats.loot)p+=item.stats.loot*5;
    }}
  });
  return Math.floor(p);
}
function equipItem(itemId){
  const item=state.combat.equipment.find(e=>e.id===itemId);if(!item)return;
  // Unequip current item in that slot (just null it)
  state.combat.equipped[item.slot]=itemId;
  showToast(item.emoji+' '+item.name+' 장착!');saveGame();renderAdventure();
}
function unequipItem(slot){state.combat.equipped[slot]=null;saveGame();renderAdventure();}
function sellEquip(itemId){
  const idx=state.combat.equipment.findIndex(e=>e.id===itemId);if(idx<0)return;
  const item=state.combat.equipment[idx];
  // Unequip if equipped
  ['weapon','armor','accessory','rune'].forEach(s=>{if(state.combat.equipped[s]===itemId)state.combat.equipped[s]=null;});
  const sellValue=Math.floor(item.floor*10*(RARITY_TIERS.findIndex(r=>r.id===item.rarity)+1));
  state.combat.equipment.splice(idx,1);
  state.lumen+=sellValue;state.totalLumen+=sellValue;
  showToast(item.name+' 판매! +'+fmt(sellValue)+' 루멘');
  closeEquipPopup();updateTopBar();saveGame();renderAdventure();
}
function tryDropEquipment(floor){

// CHARACTER COMBAT SKILLS
const CHAR_SKILLS=[
  {charIdx:0,name:'빛의 섬광',desc:'300% 피해',icon:'✨',cooldown:5,type:'damage',value:3.0},
  {charIdx:1,name:'텔레파시 공격',desc:'1턴 기절',icon:'🧠',cooldown:7,type:'stun',value:1},
  {charIdx:2,name:'감정 폭발',desc:'ATK+50% 3턴',icon:'💥',cooldown:8,type:'buff_atk',value:0.5,duration:3},
  {charIdx:3,name:'투명화',desc:'다음 공격 회피',icon:'👻',cooldown:6,type:'dodge',value:1},
  {charIdx:4,name:'기계 강화',desc:'전리품 x2 5턴',icon:'⚙',cooldown:10,type:'buff_loot',value:1.0,duration:5},
  {charIdx:5,name:'그림자 일격',desc:'HP<30% 즉사',icon:'🌑',cooldown:8,type:'execute',value:0.3},
  {charIdx:6,name:'치유의 물결',desc:'HP 50% 회복',icon:'💧',cooldown:9,type:'heal',value:0.5},
];
function useSkill(skillIdx){
  const sk=CHAR_SKILLS[skillIdx];if(!sk)return;
  if(!state.characters[sk.charIdx].recruited)return;
  const cd=state.combat.skillCooldowns[sk.charIdx]||0;
  if(cd>0){showToast(sk.name+' 쿨다운 '+cd+'턴 남음');return;}
  state.combat.skillCooldowns[sk.charIdx]=sk.cooldown;
  state.quests.totalSkillUses=(state.quests.totalSkillUses||0)+1;
  const monster=getFloorMonster(state.combat.floor);
  const power=getCombatPower();
  let msg='';
  switch(sk.type){
    case'damage':{
      const dmg=Math.floor(power*sk.value);
      state.combat.monsterCurrentHp=Math.max(0,(state.combat.monsterCurrentHp||monster.hp)-dmg);
      msg=CHARACTERS[sk.charIdx].name+'의 '+sk.name+'! '+fmt(dmg)+' 피해!';
      showBattleDmg(dmg,'#ffaa00',true);triggerPlayerAttackAnim();triggerMonsterHitAnim();
    }break;
    case'stun':{
      state.combat.activeBuffs.push({type:'stun',value:1,remaining:1});
      msg=CHARACTERS[sk.charIdx].name+'의 '+sk.name+'! 적 기절!';
    }break;
    case'buff_atk':{
      state.combat.activeBuffs.push({type:'atk_buff',value:sk.value,remaining:sk.duration});
      msg=CHARACTERS[sk.charIdx].name+'의 '+sk.name+'! 공격력 +'+Math.round(sk.value*100)+'%!';
    }break;
    case'dodge':{
      state.combat.activeBuffs.push({type:'dodge',value:1,remaining:1});
      msg=CHARACTERS[sk.charIdx].name+'의 '+sk.name+'! 다음 공격 회피!';
    }break;
    case'buff_loot':{
      state.combat.activeBuffs.push({type:'loot_buff',value:sk.value,remaining:sk.duration});
      msg=CHARACTERS[sk.charIdx].name+'의 '+sk.name+'! 전리품 x2!';
    }break;
    case'execute':{
      const mHp=state.combat.monsterCurrentHp||monster.hp;
      if(mHp<monster.hp*sk.value){
        state.combat.monsterCurrentHp=0;
        msg=CHARACTERS[sk.charIdx].name+'의 '+sk.name+'! 즉사 처치!';
        showBattleDmg(mHp,'#ff4444',true);triggerPlayerAttackAnim();triggerMonsterHitAnim();
      }else{
        msg=CHARACTERS[sk.charIdx].name+'의 '+sk.name+'... HP가 30% 이상!';
      }
    }break;
    case'heal':{
      const healAmt=Math.floor(state.combat.playerMaxHp*sk.value);
      state.combat.playerHp=Math.min(state.combat.playerMaxHp,state.combat.playerHp+healAmt);
      msg=CHARACTERS[sk.charIdx].name+'의 '+sk.name+'! HP +'+fmt(healAmt)+'!';
    }break;
  }
  addBattleLog('🔮 '+msg,'skill');
  saveGame();renderAdventure();
}

// COMBAT POWER (updated with equipment)
function getCombatPower(){
  let p=0;
  for(let i=0;i<BUILDINGS.length;i++){const s=state.buildings[i];if(!s.unlocked)continue;p+=s.level*(i+1)*10+s.expansions*50;for(let e=0;e<s.expansions;e++)p+=s.expLevels[e]*20;}
  for(let i=0;i<CHARACTERS.length;i++){if(state.characters[i].recruited)p+=100+state.characters[i].level*50;}
  p*=(1+state.prestigeCount*0.2);
  for(let i=0;i<FACILITIES.length;i++){if(state.facilities[i].built)p+=200+state.facilities[i].level*100;}
  p+=getEquipPower();
  p*=(1+(state.combat.upgrades.atk||0)*0.1);
  // Active buffs
  (state.combat.activeBuffs||[]).forEach(b=>{if(b.type==='atk_buff')p*=(1+b.value);});
  // Collection ATK bonus
  const collB=getCollectionBonuses();
  if(collB.atk>0)p*=(1+collB.atk);
  if(collB.allStats>0)p*=(1+collB.allStats);
  // Event combat boost
  const evtFx=getEventEffects();
  p*=evtFx.combatMulti;
  return Math.floor(p);
}
function getLootMulti(){
  let m=1+(state.combat.upgrades.loot||0)*0.15;
  // Equipment loot bonus
  const eq=state.combat.equipped;
  ['weapon','armor','accessory','rune'].forEach(slot=>{
    if(eq[slot]!=null){const item=state.combat.equipment.find(e=>e.id===eq[slot]);if(item&&item.stats.loot)m+=item.stats.loot/100;}
  });
  (state.combat.activeBuffs||[]).forEach(b=>{if(b.type==='loot_buff')m+=b.value;});
  // Collection loot bonus
  const collB=getCollectionBonuses();
  if(collB.loot>0)m+=collB.loot;
  return m;
}
function getCritChance(){
  let c=5; // base 5%
  const eq=state.combat.equipped;
  ['weapon','armor','accessory','rune'].forEach(slot=>{
    if(eq[slot]!=null){const item=state.combat.equipment.find(e=>e.id===eq[slot]);if(item&&item.stats.crit)c+=item.stats.crit;}
  });
  return Math.min(c,80);
}
function getDefense(){
  let d=0;
  const eq=state.combat.equipped;
  ['weapon','armor','accessory','rune'].forEach(slot=>{
    if(eq[slot]!=null){const item=state.combat.equipment.find(e=>e.id===eq[slot]);if(item&&item.stats.def)d+=item.stats.def;}
  });
  return d;
}
function getBattleInterval(){return Math.max(500,2000-2000*(state.combat.upgrades.speed||0)*0.08);}
function getBossDmgMulti(){return 1+(state.combat.upgrades.boss||0)*0.2;}

// MAIN COMBAT TICK (enhanced with HP, animations, equipment drops)
let lastBattleTick=0;
function combatTick(now){
  if(!state.combat.autoBattle)return;
  const interval=getBattleInterval();
  if(now-lastBattleTick<interval)return;
  lastBattleTick=now;
  initPlayerHp();
  const floor=state.combat.floor;
  const monster=getFloorMonster(floor);
  if(monster.isBoss)return; // Boss requires manual

  // Init monster HP if needed
  if(!state.combat.monsterCurrentHp||state.combat.monsterCurrentHp<=0)
    state.combat.monsterCurrentHp=monster.hp;

  const power=getCombatPower();
  const isCrit=Math.random()*100<getCritChance();
  const dmgToMonster=Math.floor(power*(0.4+Math.random()*0.3)*(isCrit?2:1));

  // Check stun
  const stunBuff=(state.combat.activeBuffs||[]).find(b=>b.type==='stun'&&b.remaining>0);

  // Player attacks
  state.combat.monsterCurrentHp=Math.max(0,state.combat.monsterCurrentHp-dmgToMonster);
  const critText=isCrit?' 치명타!':'';
  addBattleLog('⚔ '+fmt(dmgToMonster)+' 피해!'+critText,'hit');
  triggerPlayerAttackAnim();triggerMonsterHitAnim();
  if(isCrit)showBattleDmg(dmgToMonster,'#ffcc00',true);

  // Monster attacks back (if not stunned)
  if(!stunBuff&&state.combat.monsterCurrentHp>0){
    const monsterDmg=Math.max(1,Math.floor(monster.hp*0.03-getDefense()*0.5));
    // Check dodge
    const dodgeBuff=(state.combat.activeBuffs||[]).find(b=>b.type==='dodge'&&b.remaining>0);
    if(dodgeBuff){
      addBattleLog('👻 회피 성공!','skill');
      dodgeBuff.remaining=0;
    }else{
      state.combat.playerHp=Math.max(0,state.combat.playerHp-monsterDmg);
      if(monsterDmg>0){triggerMonsterAttackAnim();setTimeout(()=>triggerPlayerHitAnim(),150);}
    }
  }

  // Check player death
  if(state.combat.playerHp<=0){
    state.combat.floor=Math.max(0,state.combat.floor-5);
    state.combat.playerHp=state.combat.playerMaxHp;
    state.combat.monsterCurrentHp=0;
    addBattleLog('💀 HP 소진! 5층 후퇴!','hit');
    showToast('💀 체력 소진! 5층 후퇴...');
    tickBuffCooldowns();
    return;
  }

  // Monster defeated?
  if(state.combat.monsterCurrentHp<=0){
    const reward=Math.floor(monster.reward*getLootMulti());
    state.lumen+=reward;state.totalLumen+=reward;
    state.combat.floor++;state.combat.monstersDefeated++;
    state.combat.monsterCurrentHp=0;
    if(state.combat.floor>state.combat.highestFloor)state.combat.highestFloor=state.combat.floor;
    addBattleLog('💰 +'+fmt(reward)+' 루멘','reward');
    showVictory(reward);
    // HP regen between battles
    state.combat.playerHp=Math.min(state.combat.playerMaxHp,state.combat.playerHp+Math.floor(state.combat.playerMaxHp*0.1));
    // Equipment drop
    tryDropEquipment(floor);
    // Update collection
    const zone=getZone(floor);
    updateCollection(monster.name,monster.emoji,zone.name);
    // Weekly counters
    state.quests.weeklyCounters.monstersKilled=(state.quests.weeklyCounters.monstersKilled||0)+1;
    state.quests.weeklyCounters.floorsCleared=state.combat.highestFloor;
    // Collection stone income
    const collB=getCollectionBonuses();
    if(collB.stonePerMin>0&&Math.random()<0.05)state.combat.magicStones+=1;
    // Tick cooldowns
    tickBuffCooldowns();
  }
}

function tickBuffCooldowns(){
  // Skill cooldowns
  Object.keys(state.combat.skillCooldowns).forEach(k=>{
    if(state.combat.skillCooldowns[k]>0)state.combat.skillCooldowns[k]--;
  });
  // Active buffs
  state.combat.activeBuffs=(state.combat.activeBuffs||[]).filter(b=>{b.remaining--;return b.remaining>0;});
}

function challengeBoss(){
  const floor=state.combat.floor;const monster=getFloorMonster(floor);
  if(!monster.isBoss)return;
  initPlayerHp();
  if(!state.combat.monsterCurrentHp||state.combat.monsterCurrentHp<=0)
    state.combat.monsterCurrentHp=monster.hp;
  const power=getCombatPower()*getBossDmgMulti();
  const isCrit=Math.random()*100<getCritChance();
  const dmg=Math.floor(power*(0.6+Math.random()*0.4)*(isCrit?2:1));
  state.combat.monsterCurrentHp=Math.max(0,state.combat.monsterCurrentHp-dmg);
  addBattleLog('🗡 보스 공격! '+fmt(dmg)+' 피해!'+(isCrit?' 치명타!':''),'hit');
  triggerPlayerAttackAnim();triggerMonsterHitAnim();
  if(isCrit)showBattleDmg(dmg,'#ffcc00',true);
  // Boss attacks back
  const bossDmg=Math.max(1,Math.floor(monster.hp*0.05-getDefense()*0.3));
  const dodgeBuff=(state.combat.activeBuffs||[]).find(b=>b.type==='dodge'&&b.remaining>0);
  if(dodgeBuff){addBattleLog('👻 회피!','skill');dodgeBuff.remaining=0;}
  else{state.combat.playerHp=Math.max(0,state.combat.playerHp-bossDmg);triggerMonsterAttackAnim();setTimeout(()=>triggerPlayerHitAnim(),150);}
  if(state.combat.playerHp<=0){
    state.combat.floor=Math.max(0,state.combat.floor-5);state.combat.playerHp=state.combat.playerMaxHp;state.combat.monsterCurrentHp=0;
    addBattleLog('💀 보스에게 쓰러졌습니다!','hit');showToast('💀 보스에게 패배...');
    tickBuffCooldowns();updateTopBar();saveGame();renderAdventure();return;
  }
  if(state.combat.monsterCurrentHp<=0){
    const reward=Math.floor(monster.reward*getLootMulti());
    state.lumen+=reward;state.totalLumen+=reward;
    state.combat.magicStones+=monster.magicStones;
    state.combat.floor++;state.combat.monstersDefeated++;
    state.combat.monsterCurrentHp=0;
    if(state.combat.floor>state.combat.highestFloor)state.combat.highestFloor=state.combat.floor;
    addBattleLog('🎉 보스 처치! +'+fmt(reward)+' 루멘 +'+monster.magicStones+' 🔮','reward');
    showToast('🎉 보스 처치! +'+fmt(reward)+' 루멘, +'+monster.magicStones+' 마정석');
    showVictory(reward);
    state.combat.playerHp=Math.min(state.combat.playerMaxHp,state.combat.playerHp+Math.floor(state.combat.playerMaxHp*0.2));
    tryDropEquipment(floor);
    // Collection & weekly
    const zone=getZone(floor);
    updateCollection(monster.name,monster.emoji,zone.name);
    state.quests.weeklyCounters.monstersKilled=(state.quests.weeklyCounters.monstersKilled||0)+1;
    state.quests.weeklyCounters.floorsCleared=state.combat.highestFloor;
    // One-shot boss check (boss killed in single hit = monsterCurrentHp went from full to 0)
    if(dmg>=monster.hp)state.achievements._oneshotBoss=true;
    tickBuffCooldowns();
  }
  updateTopBar();saveGame();renderAdventure();
}

// SWEEP SYSTEM
function doSweep(){
  const maxFloor=state.combat.highestFloor;if(maxFloor<=0)return;
  const now=Date.now();if(now<(state.combat.sweepCooldown||0)){showToast('⏱ 소탕 쿨다운 중!');return;}
  const floorsToSweep=Math.min(10,maxFloor);
  const cost=floorsToSweep*10;
  if(state.lumen<cost){showToast('루멘 부족! ('+fmt(cost)+' 필요)');return;}
  state.lumen-=cost;
  let totalReward=0;
  for(let f=0;f<floorsToSweep;f++){
    const m=getFloorMonster(f);
    totalReward+=Math.floor(m.reward*getLootMulti()*0.5);
  }
  state.lumen+=totalReward;state.totalLumen+=totalReward;
  state.combat.sweepCooldown=now+300000; // 5 min cooldown
  addBattleLog('🧹 소탕! '+floorsToSweep+'층 정리, +'+fmt(totalReward)+' 루멘','reward');
  showToast('🧹 소탕 완료! +'+fmt(totalReward)+' 루멘');
  // Chance for equipment drops during sweep
  for(let f=0;f<floorsToSweep;f++){if(Math.random()<0.08&&state.combat.equipment.length<20){
    const item=generateEquipment(f);state.combat.equipment.push(item);
  }}
  updateTopBar();saveGame();renderAdventure();
}

function getStoryProgress(){
  const ch=state.quests.mainChapter||0;
  const step=state.quests.mainStep||0;
  if(ch>=MAIN_STORY.length)return{done:true,ch,step};
  const chapter=MAIN_STORY[ch];
  // Check current step
  if(step<chapter.steps.length&&chapter.steps[step].check()){
    // Claim reward
    const r=chapter.steps[step].reward;
    if(r.lumen){state.lumen+=r.lumen;state.totalLumen+=r.lumen;}
    if(r.stars)state.stars+=r.stars;
    state.quests.mainStep=(state.quests.mainStep||0)+1;
    showToast('📖 스토리 진행! '+chapter.steps[step].desc);
    saveGame();
    // Chapter complete?
    if(state.quests.mainStep>=chapter.steps.length){
      state.quests.mainChapter=(state.quests.mainChapter||0)+1;
      state.quests.mainStep=0;
      showToast('📘 '+chapter.title+' 완료!');
    }
  }
  return{done:ch>=MAIN_STORY.length,ch:state.quests.mainChapter||0,step:state.quests.mainStep||0};
}

  } else {
    html+=`<div class="story-box"><div class="story-title">📖 모든 스토리 완료!</div><div class="story-dialogue">"전설의 수호자여, 당신의 이야기는 영원히 기억될 것입니다."</div></div>`;
  }
  // Streak display
  if((state.quests.streak||0)>0){
    html+=`<div class="streak-box"><span class="streak-fire">🔥</span> 연속 ${state.quests.streak}일 올클리어! (보너스: +${fmt(1000*(state.quests.streak+1))} 루멘)</div>`;
  }
  // Toggle: daily / weekly
  html+=`<div class="quest-toggle">
    <button class="quest-toggle-btn ${qTab==='daily'?'active':''}" onclick="state.quests.questSubTab='daily';renderAdventure()">일일</button>
    <button class="quest-toggle-btn ${qTab==='weekly'?'active':''}" onclick="state.quests.questSubTab='weekly';renderAdventure()">주간</button>
  </div>`;
  if(qTab==='daily'){
    // Claim all button
    const hasClaimable=state.quests.daily.some(q=>q.completed&&!q.claimed);
    html+=`<button class="quest-claim-all" onclick="claimAllQuests('daily')" ${hasClaimable?'':'disabled'}>📜 전체 받기</button>`;
    html+='<div class="panel-title">일일 퀘스트</div>';
    state.quests.daily.forEach((q,idx)=>{
      const pct=Math.min(100,Math.floor(q.progress/q.goal*100));
      const rTxt=getRewardText(q.reward);
      html+=`<div class="quest-card ${q.claimed?'claimed':''}">
        <div class="qc-info"><div class="qc-desc">${q.desc}</div><div class="qc-reward">보상: ${rTxt}</div></div>
        <div class="qc-prog"><div class="qc-bar"><div class="qc-fill" style="width:${pct}%"></div></div><div class="qc-num">${q.progress}/${q.goal}</div></div>
        ${q.claimed?'<div class="qc-done">✓</div>':q.completed?`<button class="qc-claim" onclick="claimQuest(${idx})">받기</button>`:''}
      </div>`;
    });
  } else {
    // Weekly
    const hasClaimable=state.quests.weekly.some(q=>q.completed&&!q.claimed);
    html+=`<button class="quest-claim-all" onclick="claimAllQuests('weekly')" ${hasClaimable?'':'disabled'}>📜 전체 받기</button>`;
    // Show reset timer
    const now=new Date();const monday=new Date(now);
    const dayOfWeek=monday.getDay();const daysToMonday=dayOfWeek===0?1:(dayOfWeek===1?7:8-dayOfWeek);
    monday.setDate(monday.getDate()+daysToMonday);monday.setHours(0,0,0,0);
    const resetMs=monday.getTime()-now.getTime();
    const resetDays=Math.floor(resetMs/86400000);const resetHrs=Math.floor((resetMs%86400000)/3600000);
    html+=`<div class="panel-title">주간 퀘스트 <span style="font-size:10px;color:var(--text-dim);font-weight:400;">초기화: ${resetDays}일 ${resetHrs}시간 후</span></div>`;
    (state.quests.weekly||[]).forEach((q,idx)=>{
      const pct=Math.min(100,Math.floor(q.progress/q.goal*100));
      const rTxt=getRewardText(q.reward);
      html+=`<div class="quest-card weekly-card ${q.claimed?'claimed':''}">
        <div class="qc-info"><div class="qc-desc">${q.desc}</div><div class="qc-reward">보상: ${rTxt}</div></div>
        <div class="qc-prog"><div class="qc-bar"><div class="qc-fill" style="width:${pct}%"></div></div><div class="qc-num">${q.progress}/${q.goal}</div></div>
        ${q.claimed?'<div class="qc-done">✓</div>':q.completed?`<button class="qc-claim" onclick="claimWeeklyQuest(${idx})">받기</button>`:''}
      </div>`;
    });
  }
  p.innerHTML+=html;
}
function getRewardText(reward){
  const parts=[];
  if(reward.lumen)parts.push(fmt(reward.lumen)+' 루멘');
  if(reward.stars)parts.push(reward.stars+' 별빛');
  if(reward.stones)parts.push(reward.stones+' 마정석');
  if(reward.equipBox)parts.push('희귀 장비 상자');
  return parts.join(', ')||'???';
}
function renderAchievements(p){

function renderEquipment(p){

  html+='<div style="font-size:12px;color:var(--text);padding:4px 10px;font-family:Do Hyeon;">장착 중</div>';
  html+='<div class="equip-slots">';
  EQUIP_SLOTS.forEach(slot=>{
    const eqId=state.combat.equipped[slot.id];
    const item=eqId!=null?state.combat.equipment.find(e=>e.id===eqId):null;
    if(item){
      let statText='';
      if(item.stats.atk)statText+='ATK+'+item.stats.atk+' ';
      if(item.stats.def)statText+='DEF+'+item.stats.def+' ';
      if(item.stats.hp)statText+='HP+'+item.stats.hp+' ';
      if(item.stats.crit)statText+='CRI+'+item.stats.crit+'% ';
      if(item.stats.loot)statText+='LOOT+'+item.stats.loot+'% ';
      html+=`<div class="equip-slot filled ${item.rarityCls}" onclick="openEquipPopup(${item.id})">
        <div class="equip-slot-icon">${item.emoji}</div>
        <div class="equip-slot-name">${item.name}</div>
        <div class="equip-slot-stats">${statText.trim()}</div>
      </div>`;
    }else{
      html+=`<div class="equip-slot">
        <div class="equip-slot-icon" style="opacity:0.3;">${slot.icon}</div>
        <div class="equip-slot-label">${slot.name}</div>
      </div>`;
    }
  });
  html+='</div>';
  // Equipment power summary
  html+=`<div style="text-align:center;font-size:11px;color:var(--green);padding:4px;font-family:Do Hyeon;">장비 전투력: +${fmt(getEquipPower())}</div>`;
  // Inventory
  html+=`<div class="inv-count">가방 ${state.combat.equipment.length}/20</div>`;
  if(state.combat.equipment.length===0){
    html+='<div class="inv-empty">장비가 없습니다. 던전에서 몬스터를 처치하면 장비가 드롭됩니다!</div>';
  }else{
    html+='<div class="inv-grid">';
    // Sort by rarity desc
    const sorted=[...state.combat.equipment].sort((a,b)=>{
      const ra=RARITY_TIERS.findIndex(r=>r.id===a.rarity);
      const rb=RARITY_TIERS.findIndex(r=>r.id===b.rarity);
      return rb-ra;
    });
    sorted.forEach(item=>{
      const isEquipped=['weapon','armor','accessory','rune'].some(s=>state.combat.equipped[s]===item.id);
      let statText='';
      if(item.stats.atk)statText+='ATK+'+item.stats.atk+' ';
      if(item.stats.def)statText+='DEF+'+item.stats.def+' ';
      if(item.stats.hp)statText+='HP+'+item.stats.hp+' ';
      html+=`<div class="inv-item ${item.rarityCls} ${isEquipped?'equipped':''}" onclick="openEquipPopup(${item.id})">
        <div class="inv-item-icon">${item.emoji}</div>
        <div class="inv-item-name">${item.name}</div>
        <div class="inv-item-stats">${statText.trim()}</div>
      </div>`;
    });
    html+='</div>';
  }
  p.innerHTML+=html;
}

      const sofaColors=[['#4a3a6a','#3a2a5a','#5a4a7a'],['#5a4a7a','#4a3a6a','#6a5a8a'],['#6a5a8a','#5a4a7a','#7a6a9a'],['#7a6aaa','#6a5a9a','#9a8abb'],['#9a8acc','#8a7abb','#bbaadd']][tier];
      const cushions=tier>=2?`<div style="position:absolute;top:3px;left:${tier>=3?'4':'8'}px;display:flex;gap:2px;">${Array.from({length:tier>=3?3:2},(_,i)=>`<div style="width:${tier>=3?14:16}px;height:10px;border-radius:3px;background:${['#8a6aaa','#6a8aaa','#aa6a8a'][i]};opacity:0.6;"></div>`).join('')}</div>`:'';
      inner=`<div class="f-sofa" style="background:linear-gradient(180deg,${sofaColors[0]},${sofaColors[1]});border-color:${sofaColors[2]};${glow}"><div class="sofa-bk" style="background:linear-gradient(180deg,${sofaColors[2]},${sofaColors[0]});"></div>${cushions}</div>`;
    }break;
    case 'crystal':{
      const crysColors=['linear-gradient(180deg,#aaddff,#6688cc,#4466aa)','linear-gradient(180deg,#bbddff,#7799dd,#5577bb)','linear-gradient(180deg,#cceeFF,#88aaee,#6688cc)','linear-gradient(180deg,#ddf,#99bbff,#7799dd)','linear-gradient(180deg,#eef,#bbddff,#99bbee)'][tier];
      const crysH=30+tier*4;const crysW=12+tier*2;
      const crysGlow=8+tier*6;
      const extraCrys=tier>=3?`<div style="position:absolute;bottom:6px;left:${tier===4?'-6':'-4'}px;width:${6+tier}px;height:${14+tier*2}px;background:${crysColors};clip-path:polygon(50% 0%,100% 75%,75% 100%,25% 100%,0% 75%);opacity:0.6;transform:rotate(-15deg);"></div><div style="position:absolute;bottom:6px;right:${tier===4?'-6':'-4'}px;width:${6+tier}px;height:${12+tier*2}px;background:${crysColors};clip-path:polygon(50% 0%,100% 75%,75% 100%,25% 100%,0% 75%);opacity:0.5;transform:rotate(15deg);"></div>`:'';
      inner=`<div class="f-crystal" style="position:relative;"><div class="crys-b" style="width:${crysW}px;height:${crysH}px;background:${crysColors};box-shadow:0 0 ${crysGlow}px rgba(100,150,255,${0.3+tier*0.1});"></div>${extraCrys}<div class="crys-base" style="${tier>=3?'background:#6a6a4a;':''}"></div></div>`;
    }break;
    case 'torch':{
      const flameH=15+tier*3;const flameW=12+tier*2;
      const flameColor=['radial-gradient(ellipse at 50% 80%,#ff6600,#ff4400,transparent)','radial-gradient(ellipse at 50% 80%,#ff7711,#ff5500,transparent)','radial-gradient(ellipse at 50% 80%,#ff8822,#ff6600,transparent)','radial-gradient(ellipse at 50% 80%,#ffaa44,#ff7700,transparent)','radial-gradient(ellipse at 50% 80%,#ffcc66,#ff9900,#ff6600,transparent)'][tier];
      const flameGlow=12+tier*6;
      const poleColor=tier>=3?'linear-gradient(180deg,#7a6a4a,#5a4a3a)':'linear-gradient(180deg,#5a4a3a,#4a3a2a)';
      inner=`<div class="f-torch"><div class="torch-f" style="width:${flameW}px;height:${flameH}px;background:${flameColor};box-shadow:0 0 ${flameGlow}px rgba(255,100,0,${0.35+tier*0.1});"></div><div class="torch-p" style="background:${poleColor};"></div></div>`;
    }break;
    case 'piano':{
      const bodyColor=tier>=3?`linear-gradient(180deg,${tier===4?'#3a3a4a':'#2a2a3a'},#111)`:'linear-gradient(180deg,#222,#111)';
      const keyOpacity=0.6+tier*0.08;
      const borderColor=tier>=3?(tier===4?'#6a6a8a':'#4a4a5a'):'#333';
      const goldTrim=tier>=3?`<div style="position:absolute;top:2px;left:3px;right:3px;height:1px;background:${tier===4?'linear-gradient(90deg,#88ccff,#aaddff,#88ccff)':'linear-gradient(90deg,#ffd700,#ffaa00,#ffd700)'};"></div>`:'';
      inner=`<div class="f-piano" style="background:${bodyColor};border-color:${borderColor};${glow}"><div class="piano-keys" style="opacity:${keyOpacity};"></div>${goldTrim}</div>`;
    }break;
    case 'fountain':{
      const baseColor=tier>=3?'linear-gradient(180deg,#7a8a9a,#6a7a8a)':'linear-gradient(180deg,#5a6a7a,#4a5a6a)';
      const pillarColor=tier>=3?(tier===4?'#9aaacc':'#8a9aaa'):'#6a7a8a';
      const waterSize=20+tier*4;const waterOpacity=0.5+tier*0.1;
      const extraWater=tier>=2?`<div style="position:absolute;top:${8-tier}px;left:${12-tier}px;width:${16+tier*3}px;height:${5+tier}px;background:radial-gradient(ellipse,rgba(100,180,255,${0.3+tier*0.05}),transparent);border-radius:50%;animation:fw ${1.5-tier*0.1}s ease-in-out infinite;"></div>`:'';
      inner=`<div class="f-fountain"><div class="fount-pillar" style="background:${pillarColor};${tier>=3?'width:10px;left:15px;':''}"></div><div class="fount-base" style="background:${baseColor};${glow}"></div><div class="fount-water" style="width:${waterSize}px;left:${10-tier*2}px;opacity:${waterOpacity};"></div>${extraWater}</div>`;
    }break;
    case 'bed':{
      const bedColor=tier>=3?`linear-gradient(180deg,${tier===4?'#5a7aaa':'#4a6a9a'},#2a4a6a)`:'linear-gradient(180deg,#3a5a7a,#2a4a6a)';
      const pillowColor=tier>=2?(tier>=3?'#fff':'#eee'):'#ddd';
      const blanket=tier>=2?`<div style="position:absolute;top:6px;right:2px;left:16px;bottom:2px;background:${['','','linear-gradient(135deg,#4a6a8a,#3a5a7a)','linear-gradient(135deg,#6a8aaa,#5a7a9a)','linear-gradient(135deg,#8aaabb,#7a9aaa)'][tier]};border-radius:2px;opacity:0.5;"></div>`:'';
      const pillowExtra=tier>=3?`<div style="position:absolute;top:-3px;left:17px;width:12px;height:7px;background:${pillowColor};border-radius:3px;opacity:0.8;"></div>`:'';
      inner=`<div class="f-bed" style="background:${bedColor};${tier>=3?'border-color:#6a8aaa;':''} ${glow}"><div class="bed-pw" style="background:${pillowColor};"></div>${pillowExtra}${blanket}</div>`;
    }break;
  }
  const scaleStyle=tier>0?`transform:scale(${scale});`:'';
  return `<div class="furn" style="left:${x}px;${scaleStyle}" ${click}>${inner}${lvlTag}</div>`;
}

function renderCity(){

  // Sky
  let stars='';for(let i=0;i<25;i++){stars+=`<div class="star-dot" style="left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*3}s;width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;"></div>`;}
  p.innerHTML+=`<div id="skyBg">${stars}<div class="moon"></div></div>`;
  // Click
  p.innerHTML+=`<div id="clickDisplay" onclick="doClick(event)"><div class="lumen-big">💡 ${fmt(state.lumen)}</div><div class="rate-text">+${fmt(getTotalProd())}/초</div><div class="click-hint">탭하여 +${fmt(state.clickPower)}</div></div>`;
  // Collect all rent
  const totalRent=getTotalRent();
  p.innerHTML+=`<button id="collectAllBtn" class="${totalRent>0?'':'empty'}" onclick="collectAllRent()" ${totalRent>0?'':'disabled'}>💰 월세 전체 수금 ${totalRent>0?'+'+fmt(totalRent):''}</button>`;
  // Roof
  let rf='';['#c44','#4a4','#48c','#ca4','#a4c'].forEach(c=>rf+=`<div class="roof-flag" style="background:${c};"></div>`);
  p.innerHTML+=`<div id="roofDeco">${rf}</div>`;
  // Floors
  for(let i=BUILDINGS.length-1;i>=0;i--)p.appendChild(createFloor(i));

  // === NEIGHBORHOOD: MY HOUSE + FACILITIES (separate buildings) ===
  p.appendChild(createNeighborhood());

  // === BAMBOO FOREST (below buildings) ===
  p.appendChild(createBambooArea());
}

function createBambooArea(){
  const div=document.createElement('div');
  div.className='bamboo-area';
  const bb=state.bamboo;

  if(!bb.built){
    // Not built yet - show build option
    const cost=300;
    const canAfford=state.lumen>=cost;
    div.innerHTML=`
      <div class="bamboo-scene" style="height:80px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;">
        <div style="font-size:28px;opacity:0.3;">🎋</div>
        <div style="font-family:'Do Hyeon';font-size:13px;color:#888;">대나무 숲</div>
        <div style="font-size:10px;color:#666;">세입자 고민 상담소</div>
      </div>
      <div class="bamboo-info">
        <div class="bamboo-left">
          <div class="bamboo-name">🎋 대나무 숲 건설</div>
          <div class="bamboo-desc">세입자들의 고민을 들어주면 만족도가 올라가요!</div>
        </div>
        <button class="bamboo-btn build-bamboo" onclick="buildBamboo()" ${canAfford?'':'disabled'}>
          ${fmt(cost)} 건설
        </button>
      </div>`;
    return div;
  }

  // Built - show bamboo forest scene
  let stalks='';
  for(let i=0;i<10;i++){
    const x=5+i*30,ht=50+Math.random()*30+(bb.level*3);
    stalks+=`<div class="bam-stalk" style="left:${x}px;height:${ht}px;"></div>`;
    stalks+=`<div class="bam-leaf" style="left:${x-8}px;bottom:${ht-12}px;transform:rotate(${-25+Math.random()*50}deg);"></div>`;
    if(ht>55) stalks+=`<div class="bam-leaf" style="left:${x+2}px;bottom:${ht-28}px;transform:rotate(${-30+Math.random()*60}deg);width:18px;"></div>`;
  }

  // Bench
  let benchHTML=`<div class="bamboo-bench" style="left:180px;"></div>`;
  benchHTML+=`<div class="bamboo-bench" style="left:80px;"></div>`;

  // Stones on path
  let stones='';
  for(let i=0;i<5;i++){
    stones+=`<div class="bamboo-stone" style="left:${60+i*55}px;"></div>`;
  }

  // Visitor
  let visitorHTML='';
  let btnHTML='';
  if(bb.visitorReady&&bb.visitorChar>=0&&bb.visitorChar<CHARACTERS.length){
    const ch=CHARACTERS[bb.visitorChar];
    visitorHTML=`
      <div class="bamboo-visitor" style="left:190px;animation:cb 2s ease-in-out infinite;">
        <div class="bv-head" style="background:${ch.color}40;">${ch.icon}</div>
        <div class="bv-body" style="background:${ch.bodyColor};"></div>
      </div>
      <div class="bamboo-bubble" style="bottom:72px;left:220px;">고민이 있어요...</div>
    `;
    btnHTML=`<button class="bamboo-btn counsel" onclick="startCounsel()">상담하기</button>`;
  } else {
    // Waiting for next visitor
    const elapsed=Date.now()-bb.lastCounselTime;
    const cooldown=Math.max(0, 45000-elapsed); // 45 sec cooldown
    if(cooldown>0){
      btnHTML=`<button class="bamboo-btn waiting">${Math.ceil(cooldown/1000)}초 후 방문</button>`;
    } else {
      btnHTML=`<button class="bamboo-btn waiting">세입자 기다리는 중...</button>`;
    }
  }

  const satPct=Math.min(100,Math.floor(bb.satisfaction));
  const rentBonus=Math.floor(bb.satisfaction*0.5);

  div.innerHTML=`
    <div class="bamboo-scene">
      <div class="bamboo-ground"></div>
      ${stalks}${stones}${benchHTML}${visitorHTML}
      <div class="bamboo-tap">Lv.${bb.level}</div>
    </div>
    <div class="bamboo-info">
      <div class="bamboo-left">
        <div class="bamboo-name">🎋 대나무 숲 <span style="font-size:11px;color:var(--text-dim);">상담 ${bb.counselCount}회</span></div>
        <div class="bamboo-satisfaction">만족도 ${satPct}% → 월세 +${rentBonus}%</div>
        <div style="margin-top:3px;height:4px;background:#1a1a1a;border-radius:2px;width:120px;overflow:hidden;">
          <div style="width:${satPct}%;height:100%;background:linear-gradient(90deg,#2a8a2a,#4aca4a);transition:width 0.3s;border-radius:2px;"></div>
        </div>
      </div>
      ${btnHTML}
    </div>`;
  return div;
}

function createFloor(i){
  const b=BUILDINGS[i],s=state.buildings[i];
  const cost=s.unlocked?getCost(i):b.unlockCost;
  const canAfford=state.lumen>=cost;
  const floor=document.createElement('div');
  floor.className='floor'+(s.unlocked?'':' is-locked');

  if(s.unlocked&&s.level>0){
    let furnHTML='';
    b.furniture.forEach((f,fi)=>furnHTML+=buildFurn(f.type,f.x,s.furnLevels[fi],i,fi));
    let winHTML=`<div class="window" style="left:70px;"><div class="window-glass"></div><div class="window-frame"></div><div class="window-frame2"></div></div><div class="window" style="left:180px;"><div class="window-glass"></div><div class="window-frame"></div><div class="window-frame2"></div></div>`;
    let charHTML='';
    if(i<CHARACTERS.length&&state.characters[i].recruited){
      charHTML=getCharHTML(i,140+i%3*15);
    }
    let particles='';
    for(let p=0;p<3;p++)particles+=`<div class="room-p" style="left:${10+Math.random()*80}%;top:${20+Math.random()*50}%;background:${b.color};box-shadow:0 0 4px ${b.color};animation-delay:${Math.random()*4}s;"></div>`;
    // Rent coin
    let rentHTML='';
    if(s.rentAccum>=1){
      rentHTML=`<div class="rent-coin" onclick="event.stopPropagation();collectRent(${i})">💰+${fmt(Math.floor(s.rentAccum))}</div>`;
    }
    floor.innerHTML=`<div class="room"><div class="room-bg ${b.id}"></div><div class="wall-pattern"></div>${winHTML}<div class="f-rug" style="left:25px;width:100px;background:${b.color}40;"></div>${furnHTML}${charHTML}${particles}${rentHTML}<div class="room-badge unlocked">Lv.${s.level}</div><div class="room-info"><div class="room-name">${b.name}</div><div class="room-prod">${fmt(getProd(i))}/초</div></div><div class="room-btn"><button class="up-pill ${canAfford?'afford':'no-afford'}" onclick="event.stopPropagation();onUpgrade(${i})" ${canAfford?'':'disabled'}><span class="cost-d"></span>${fmt(cost)}</button></div></div><div class="floor-line"></div>`;
  } else if(s.unlocked&&s.level===0){
    floor.innerHTML=`<div class="room"><div class="room-bg ${b.id}"></div><div class="wall-pattern"></div><div class="room-badge unlocked">Lv.0</div><div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;"><div style="font-size:30px;opacity:0.3;">${b.icon}</div><div style="font-family:'Do Hyeon';font-size:13px;color:#aaa;margin-top:3px;">${b.name}</div><button class="up-pill ${canAfford?'afford':'no-afford'}" style="margin-top:6px;" onclick="event.stopPropagation();onUpgrade(${i})" ${canAfford?'':'disabled'}><span class="cost-d"></span>${fmt(cost)} 건설</button></div></div><div class="floor-line"></div>`;
  } else {
    floor.innerHTML=`<div class="room"><div class="room-bg ${b.id}"></div><div class="locked-overlay"><div class="lock-icon">🔒</div><div class="lock-name">${b.name}</div><button class="lock-btn ${canAfford?'can':'cant'}" onclick="event.stopPropagation();onUpgrade(${i})" ${canAfford?'':'disabled'}><span class="cost-d"></span>${fmt(b.unlockCost)} 해금</button></div></div><div class="floor-line"></div>`;
  }
  floor.addEventListener('click',e=>{if(e.target.tagName==='BUTTON')return;doClick(e);});
  // Expansion wings
  if(s.unlocked&&s.level>0){
    const expWrap=document.createElement('div');expWrap.className='exp-wrap';
    for(let e=0;e<s.expansions;e++){
      const eCost=getExpUpCost(i,e);const eAfford=state.lumen>=eCost;
      const wing=document.createElement('div');wing.className='exp-wing';
      const hue=[120,200,280][e];
      wing.innerHTML=`<div class="ew-body" style="border-color:hsl(${hue},60%,40%);">
        <div class="ew-icon">${b.icon}</div><div class="ew-info">확장${e+1} Lv.${s.expLevels[e]}<br><span style="color:#8f8;font-size:9px;">+${Math.round(EXP_BONUS_PER_LVL*(1+s.expLevels[e])*100)}%</span></div>
        <button class="ew-btn ${eAfford?'afford':'no-afford'}" onclick="event.stopPropagation();upgradeExp(${i},${e})" ${eAfford?'':'disabled'}>${fmt(eCost)}</button>
      </div>`;
      expWrap.appendChild(wing);
    }
    if(canExpand(i)){
      const eCost=getExpCost(i,s.expansions);const eAfford=state.lumen>=eCost;
      const addBtn=document.createElement('div');addBtn.className='exp-wing';
      addBtn.innerHTML=`<div class="ew-body ew-new" onclick="event.stopPropagation();buildExp(${i})">
        <div class="ew-icon" style="font-size:20px;">➕</div><div class="ew-info">확장 건설<br><span style="color:#fc4;font-size:9px;">${fmt(eCost)} 루멘</span></div>
      </div>`;
      expWrap.appendChild(addBtn);
    }
    if(expWrap.children.length>0)floor.appendChild(expWrap);
  }
  return floor;
}

function renderFacilities(){
  const p=document.getElementById('facilityPanel');
  p.innerHTML='<div class="panel-title">시설 건설</div>';
  FACILITIES.forEach((f,i)=>{
    const s=state.facilities[i];

}

function renderCharacters(){
  const p=document.getElementById('charPanel');
  p.innerHTML='<div class="panel-title">캐릭터 모집</div>';
  CHARACTERS.forEach((c,i)=>{
    const s=state.characters[i];
    const lvCost=Math.floor((c.cost||100)*0.5*Math.pow(1.3,s.level));
    const evtFx=getEventEffects();
    const lvCostAdj=Math.floor(lvCost*evtFx.xpCostMulti);
    const canR=c.starCost?state.stars>=c.starCost:state.lumen>=c.cost;
    const canL=state.lumen>=lvCostAdj;
    const card=document.createElement('div');card.className='c-card'+(s.recruited?' recruited':'');
    let bC,bT;
    if(s.recruited){bC=canL?'can-level':'c-locked';bT=fmt(lvCostAdj)+' Lv Up'+(evtFx.xpCostMulti<1?' ⚡':'');}
    else{bC=canR?'can-recruit':'c-locked';bT=c.starCost?c.starCost+' ⭐':fmt(c.cost)+' 모집';}
    const coordiBtn=s.recruited?`<button class="c-btn can-level" style="margin-right:4px;background:linear-gradient(135deg,#6a3a8a,#4a2a6a);color:#ddaaff;border-color:#7a4a9a;font-size:10px;padding:6px 10px;" onclick="event.stopPropagation();openCoordi(${i})">👗</button>`:'';
    card.innerHTML=`<div class="c-portrait" style="background:${c.color}15;color:${c.color};">${c.icon}</div><div class="c-info"><div class="c-name" style="color:${c.color}">${c.full}</div><div class="c-ability">${c.ability}</div><div class="c-bonus">${c.desc}</div>${s.recruited?`<div class="c-level">Lv.${s.level}</div>`:''}</div><div style="display:flex;align-items:center;">${coordiBtn}<button class="c-btn ${bC}" onclick="onCharAction(${i})" ${(s.recruited?canL:canR)?'':'disabled'}>${bT}</button></div>`;
    p.appendChild(card);
  });
}

function updateTopBar(){
  document.getElementById('lumenVal').textContent=fmt(state.lumen);
  const r=getTotalProd();document.getElementById('lumenRate').textContent=r>0?'+'+fmt(r)+'/s':'';
  document.getElementById('starVal').textContent=state.stars;

function onUpgrade(i){
  const b=BUILDINGS[i],s=state.buildings[i];
  if(!s.unlocked){if(state.lumen>=b.unlockCost){state.lumen-=b.unlockCost;s.unlocked=true;s.lastRentTime=Date.now();showToast(b.name+' 해금!');}}
  else{const cost=getCost(i);if(state.lumen>=cost){state.lumen-=cost;s.level++;state.quests.counters.upgrades++;state.quests.weeklyCounters.buildingUps=(state.quests.weeklyCounters.buildingUps||0)+1;}}
  recalcBonuses();renderCity();updateTopBar();saveGame();
}

function buildExp(i){
  const s=state.buildings[i];if(!canExpand(i))return;
  const cost=getExpCost(i,s.expansions);if(state.lumen<cost)return;
  state.lumen-=cost;s.expansions++;
  showToast(BUILDINGS[i].name+' 확장'+s.expansions+' 건설!');
  recalcBonuses();renderCity();updateTopBar();saveGame();
}
function upgradeExp(i,e){
  const s=state.buildings[i];if(e>=s.expansions)return;
  const cost=getExpUpCost(i,e);if(state.lumen<cost)return;
  state.lumen-=cost;s.expLevels[e]++;
  recalcBonuses();renderCity();updateTopBar();saveGame();
}
function onFacility(i){
  const f=FACILITIES[i],s=state.facilities[i];
  const cost=s.built?Math.floor(f.upgradeCost*Math.pow(1.3,s.level)):f.cost;
  if(state.lumen>=cost){
    state.lumen-=cost;
    if(!s.built){s.built=true;showToast(f.name+' 건설 완료!');}
    else{s.level++;showToast(f.name+' Lv.'+s.level+'!');}
    recalcBonuses();renderFacilities();updateTopBar();saveGame();
  }
}

function onCharAction(i){
  const c=CHARACTERS[i],s=state.characters[i];
  if(!s.recruited){
    if(c.starCost){if(state.stars>=c.starCost){state.stars-=c.starCost;s.recruited=true;}}
    else{if(state.lumen>=c.cost){state.lumen-=c.cost;s.recruited=true;}}
    if(s.recruited)showToast(c.full+' 모집!');
  }else{
    const evtFx=getEventEffects();
    const cost=Math.floor((c.cost||100)*0.5*Math.pow(1.3,s.level)*evtFx.xpCostMulti);
    if(state.lumen>=cost){state.lumen-=cost;s.level++;}
  }
  recalcBonuses();renderCharacters();updateTopBar();saveGame();
}

// Rent
function collectRent(i){
  const s=state.buildings[i];
  const amount=Math.floor(s.rentAccum);
  if(amount<=0)return;
  state.lumen+=amount;state.totalLumen+=amount;
  s.rentAccum=0;s.lastRentTime=Date.now();
  state.quests.counters.rentCollects++;
  showToast('💰 월세 +'+fmt(amount));
  renderCity();updateTopBar();saveGame();
}
function collectAllRent(){
  let total=0;
  state.buildings.forEach(s=>{
    const a=Math.floor(s.rentAccum);
    if(a>0){total+=a;state.lumen+=a;state.totalLumen+=a;s.rentAccum=0;s.lastRentTime=Date.now();}
  });
  if(total>0){
    showToast('💰 월세 전체 수금 +'+fmt(total));
    renderCity();updateTopBar();saveGame();
  }
}

function buildBamboo(){
  if(state.lumen>=300){
    state.lumen-=300;
    state.bamboo.built=true;state.bamboo.lastCounselTime=Date.now()-50000;
    showToast('🎋 대나무 숲 완성!');
    recalcBonuses();renderCity();updateTopBar();saveGame();
  }
}

let currentWorry=null;
function startCounsel(){
  if(!state.bamboo.visitorReady||state.bamboo.visitorChar<0)return;
  // Pick a worry
  const charWorries=WORRIES.filter(w=>{
    const ch=CHARACTERS[state.bamboo.visitorChar];
    return ch&&w.char===ch.name;
  });
  currentWorry=charWorries.length>0?charWorries[Math.floor(Math.random()*charWorries.length)]:WORRIES[Math.floor(Math.random()*WORRIES.length)];

  document.getElementById('counselIcon').textContent=currentWorry.icon;
  document.getElementById('counselChar').textContent=currentWorry.char+'의 고민';
  document.getElementById('counselWorry').textContent='"'+currentWorry.worry+'"';

  const choicesDiv=document.getElementById('counselChoices');
  choicesDiv.innerHTML='';choicesDiv.style.display='flex';
  document.getElementById('counselResult').style.display='none';

  currentWorry.choices.forEach((ch,ci)=>{
    const btn=document.createElement('button');
    btn.style.cssText='padding:10px 14px;border:none;border-radius:10px;font-size:12px;cursor:pointer;font-family:"Gothic A1";transition:all 0.15s;text-align:left;line-height:1.3;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#ddd;';
    btn.textContent=ch;
    btn.onmouseenter=()=>{btn.style.borderColor='#4a8a4a';btn.style.background='rgba(51,255,102,0.06)';};
    btn.onmouseleave=()=>{btn.style.borderColor='rgba(255,255,255,0.1)';btn.style.background='rgba(255,255,255,0.06)';};
    btn.onclick=()=>onCounselChoice(ci);
    choicesDiv.appendChild(btn);
  });

  document.getElementById('counselPopup').style.display='flex';
}

function onCounselChoice(idx){
  const isGood=idx===currentWorry.goodIdx;
  document.getElementById('counselChoices').style.display='none';
  const resultDiv=document.getElementById('counselResult');
  resultDiv.style.display='block';

  if(isGood){
    const satGain=8+state.bamboo.level*2;
    const lumenBonus=Math.floor(50*(1+state.bamboo.level*0.3));
    state.bamboo.satisfaction=Math.min(100,state.bamboo.satisfaction+satGain);
    state.bamboo.counselCount++;
    state.quests.counters.counsels=(state.quests.counters.counsels||0)+1;
    state.lumen+=lumenBonus;state.totalLumen+=lumenBonus;

    document.getElementById('counselReply').innerHTML='<div style="font-size:20px;margin-bottom:6px;">😊</div>'+currentWorry.goodReply;
    document.getElementById('counselReward').textContent='만족도 +'+satGain+'%  |  +'+fmt(lumenBonus)+' 루멘';
  } else {
    const satGain=2;
    state.bamboo.satisfaction=Math.min(100,state.bamboo.satisfaction+satGain);
    state.bamboo.counselCount++;
    state.quests.counters.counsels=(state.quests.counters.counsels||0)+1;

    document.getElementById('counselReply').innerHTML='<div style="font-size:20px;margin-bottom:6px;">😐</div>'+currentWorry.badReply;
    document.getElementById('counselReward').textContent='만족도 +'+satGain+'%';
  }

  state.bamboo.visitorReady=false;
  state.bamboo.visitorChar=-1;
  state.bamboo.lastCounselTime=Date.now();
  recalcBonuses();updateTopBar();saveGame();
}

function closeCounsel(){
  document.getElementById('counselPopup').style.display='none';
  renderCity();
}

// Spawn visitor periodically
function checkBambooVisitor(){
  if(!state.bamboo.built)return;
  if(state.bamboo.visitorReady)return;
  const elapsed=Date.now()-state.bamboo.lastCounselTime;
  const cooldown=45000-state.bamboo.level*3000; // Faster with level
  if(elapsed>=Math.max(15000,cooldown)){
    // Pick a recruited character
    const recruited=[];
    CHARACTERS.forEach((c,i)=>{if(state.characters[i].recruited)recruited.push(i);});
    if(recruited.length>0){
      state.bamboo.visitorReady=true;
      state.bamboo.visitorChar=recruited[Math.floor(Math.random()*recruited.length)];
    }
  }
}

function doPrestige(){
  const stars=getPrestigeStars();if(stars<=0)return;
  if(!confirm('환생하시겠습니까? +'+stars+' ⭐'))return;
  state.stars+=stars;state.prestigeCount++;state.lumen=50;state.totalLumen=50;
  const savedExp=state.buildings.map(b=>b.expansions||0);
  state.buildings=BUILDINGS.map((_,i)=>({level:0,unlocked:i===0,furnLevels:[0,0,0],rentAccum:0,lastRentTime:Date.now(),expansions:savedExp[i]||0,expLevels:[0,0,0]}));
  state.characters.forEach(c=>{c.level=0;});
  state.facilities.forEach(f=>{f.level=0;}); // Keep built status
  // Combat: keep highestFloor, magicStones, upgrades, equipment; reset current floor
  state.combat.floor=0;state.combat.monstersDefeated=0;state.combat.monsterCurrentHp=0;
  state.combat.playerHp=0;state.combat.skillCooldowns={};state.combat.activeBuffs=[];state.combat.battleLog=[];
  recalcBonuses();showToast('환생! +'+stars+' ⭐');
  renderCity();renderStats();updateTopBar();saveGame();
}

// GAME LOOP
// =====================================================
let lastTick=Date.now();
function gameLoop(){
  const now=Date.now(),dt=(now-lastTick)/1000;lastTick=now;
  // Production
  const prod=getTotalProd();
  if(prod>0){state.lumen+=prod*dt;state.totalLumen+=prod*dt;}
  // Rent accumulation
  for(let i=0;i<BUILDINGS.length;i++){
    const b=BUILDINGS[i],s=state.buildings[i];
    if(!s.unlocked||s.level===0)continue;
    const rent=getRent(i);
    if(rent>0)s.rentAccum+=rent*dt/b.rentInterval;
  }
  // Combat auto-battle
  combatTick(now);
  // Track earned lumen for quests
  if(prod>0)state.quests.counters.earnedLumen+=prod*dt;
  // Bamboo visitor check
  checkBambooVisitor();
  // Bamboo satisfaction slowly decays
  if(state.bamboo.built&&state.bamboo.satisfaction>0){
    state.bamboo.satisfaction=Math.max(0,state.bamboo.satisfaction-dt*0.02);
  }
  // Achievement check every 5 seconds
  achCheckTimer+=dt;if(achCheckTimer>=5){achCheckTimer=0;checkAchievements();}
  // Collection stone per min bonus
  const collBonuses=getCollectionBonuses();
  if(collBonuses.stonePerMin>0){
    if(!state._stoneAccum)state._stoneAccum=0;
    state._stoneAccum+=collBonuses.stonePerMin*dt/60;
    if(state._stoneAccum>=1){const gained=Math.floor(state._stoneAccum);state.combat.magicStones+=gained;state._stoneAccum-=gained;}
  }
  // Recalc bonuses periodically for event changes
  if(Math.floor(now/10000)!==Math.floor((now-dt*1000)/10000))recalcBonuses();
  updateTopBar();
}

function saveGame(){state.lastSave=Date.now();localStorage.setItem('keeperIdle3',JSON.stringify(state));}
function loadGame(){
  const saved=localStorage.getItem('keeperIdle3');if(!saved)return;
  try{
    const s=JSON.parse(saved);
    state.lumen=s.lumen||50;state.stars=s.stars||0;
    state.totalLumen=s.totalLumen||0;state.totalClicks=s.totalClicks||0;
    state.prestigeCount=s.prestigeCount||0;state.lastSave=s.lastSave||Date.now();
    if(s.buildings)s.buildings.forEach((b,i)=>{if(state.buildings[i]){
      Object.assign(state.buildings[i],b);
      if(!state.buildings[i].furnLevels)state.buildings[i].furnLevels=[0,0,0];
      if(!state.buildings[i].rentAccum)state.buildings[i].rentAccum=0;
      if(!state.buildings[i].lastRentTime)state.buildings[i].lastRentTime=Date.now();
      if(state.buildings[i].expansions===undefined)state.buildings[i].expansions=0;
      if(!state.buildings[i].expLevels)state.buildings[i].expLevels=[0,0,0];
    }});
    if(s.facilities)s.facilities.forEach((f,i)=>{if(state.facilities[i])Object.assign(state.facilities[i],f);});
    if(s.characters)s.characters.forEach((c,i)=>{if(state.characters[i])Object.assign(state.characters[i],c);});
    if(s.bamboo)Object.assign(state.bamboo,s.bamboo);
    if(s.myHouse)Object.assign(state.myHouse,s.myHouse);
    if(s.coordi)state.coordi=s.coordi;
    if(s.quests){
      // Merge carefully to preserve new fields
      if(s.quests.daily)state.quests.daily=s.quests.daily;
      if(s.quests.dailyRefreshTime)state.quests.dailyRefreshTime=s.quests.dailyRefreshTime;
      if(s.quests.counters)Object.assign(state.quests.counters,s.quests.counters);
      if(s.quests.weekly)state.quests.weekly=s.quests.weekly;
      if(s.quests.weeklyRefreshTime)state.quests.weeklyRefreshTime=s.quests.weeklyRefreshTime;
      if(s.quests.weeklyCounters)Object.assign(state.quests.weeklyCounters,s.quests.weeklyCounters);
      if(s.quests.totalSkillUses!==undefined)state.quests.totalSkillUses=s.quests.totalSkillUses;
      if(s.quests.streak!==undefined)state.quests.streak=s.quests.streak;
      if(s.quests.lastAllDailyDate)state.quests.lastAllDailyDate=s.quests.lastAllDailyDate;
      if(s.quests.questSubTab)state.quests.questSubTab=s.quests.questSubTab;
      if(s.quests.mainChapter!==undefined)state.quests.mainChapter=s.quests.mainChapter;
      if(s.quests.mainStep!==undefined)state.quests.mainStep=s.quests.mainStep;
    }
    if(s.achievements)state.achievements=s.achievements;
    if(s.collection)state.collection=s.collection;
    if(s.events)state.events=s.events;
    if(s.combat){
      // Preserve defaults for new fields
      const defaults={playerHp:0,playerMaxHp:0,equipment:[],equipped:{weapon:null,armor:null,accessory:null,rune:null},
        skillCooldowns:{},activeBuffs:[],sweepCooldown:0,battleLog:[],monsterCurrentHp:0};
      Object.assign(state.combat,defaults,s.combat);
      // Ensure equipment array has proper structure
      if(!Array.isArray(state.combat.equipment))state.combat.equipment=[];
      if(!state.combat.equipped)state.combat.equipped={weapon:null,armor:null,accessory:null,rune:null};
      if(!state.combat.skillCooldowns)state.combat.skillCooldowns={};
      if(!Array.isArray(state.combat.activeBuffs))state.combat.activeBuffs=[];
      if(!Array.isArray(state.combat.battleLog))state.combat.battleLog=[];
      // Update equipIdCounter to avoid collisions
      state.combat.equipment.forEach(e=>{if(e.id>=equipIdCounter)equipIdCounter=e.id+1;});
    }
    if(!state.combat.upgrades)state.combat.upgrades={atk:0,loot:0,speed:0,boss:0};
    recalcBonuses();
    initPlayerHp();
    // Offline
    const elapsed=Date.now()-state.lastSave;
    if(elapsed>30000){
      const prod=getTotalProd();
      if(prod>0){
        const offSec=Math.min(elapsed/1000,28800);
        const earned=Math.floor(prod*offSec*state.offlineMulti*0.5);
        // Rent too
        let rentEarned=0;
        for(let i=0;i<BUILDINGS.length;i++){
          const b=BUILDINGS[i],bs=state.buildings[i];
          if(!bs.unlocked||bs.level===0)continue;
          const r=getRent(i);
          rentEarned+=r*offSec/b.rentInterval;
          bs.rentAccum+=r*offSec/b.rentInterval;
        }
        if(earned>0){
          state.lumen+=earned;state.totalLumen+=earned;
          document.getElementById('offlineAmount').textContent='+'+fmt(earned)+' 루멘'+(rentEarned>0?'\n+'+fmt(Math.floor(rentEarned))+' 월세':'');
          document.getElementById('offlinePopup').classList.add('show');
        }
      }
    }
  }catch(e){console.error(e);}
}
function closeOffline(){document.getElementById('offlinePopup').classList.remove('show');}

function doLogin(){
  const nick=document.getElementById('nicknameInput').value.trim();
  if(!nick||nick.length>12){
    document.getElementById('loginStatus').textContent='닉네임을 입력해주세요 (1~12자)';

  }
  document.getElementById('loginBtn').disabled=true;
  document.getElementById('loginStatus').textContent='접속 중...';

  fetch('/api/register',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({nickname:nick})
  }).then(r=>r.json()).then(d=>{
    if(d.error){
      document.getElementById('loginStatus').textContent=d.error;
      document.getElementById('loginBtn').disabled=false;
      return;
    }
    myPid=d.pid;myNickname=d.nickname;
    localStorage.setItem('keeperPid',myPid);

    document.getElementById('loginScreen').style.display='none';

    document.getElementById('loginBtn').disabled=false;
  });
}

function startMPSync(){

function syncToServer(){
  if(!myPid)return;
  const bLevels=state.buildings.map(b=>b.level);
  fetch('/api/sync',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      pid:myPid,
      lumen:Math.floor(state.lumen),
      totalLumen:Math.floor(state.totalLumen),
      stars:state.stars,
      buildingLevels:bLevels,
      buildings:state.buildings,
      characters:state.characters,
      bamboo:state.bamboo,
      facilities:state.facilities,
      myHouse:state.myHouse,
      coordi:state.coordi,
      combatPower:getCombatPower(),
      combatFloor:state.combat.floor,
      combatEquipCount:state.combat.equipment.length,
      combatHighestFloor:state.combat.highestFloor,
      collection:state.collection,
    })
  }).then(r=>r.json()).then(d=>{
    if(d.gifts&&d.gifts.length>0){
      // Received gifts!
      d.gifts.forEach(g=>{
        if(g.stars){state.stars+=g.stars;showGiftNotif(g.from_name,g.stars,true);}
        else{state.lumen+=g.amount;state.totalLumen+=g.amount;showGiftNotif(g.from_name,g.amount,false);}
      });
      updateTopBar();saveGame();
    }
    if(d.overrides){
      if(d.overrides.stars!==undefined) state.stars=d.overrides.stars;
      if(d.overrides.lumen!==undefined){state.lumen=d.overrides.lumen;}
      updateTopBar();saveGame();
    }
    // Pick up multiplayer state from sync response
    if(d.guildId!==undefined)mpData.guild.id=d.guildId||null;
    if(d.arena){
      if(d.arena.rating!==undefined)mpData.arena.rating=d.arena.rating;
      if(d.arena.wins!==undefined)mpData.arena.wins=d.arena.wins;
      if(d.arena.losses!==undefined)mpData.arena.losses=d.arena.losses;
    }
  }).catch(()=>{});
}

          <button class="rank-btn gift" onclick="event.stopPropagation();openGift('${r.pid}','${r.nickname}')">선물</button>`:''}
        </div>
      </div>`;
    });
  } else if(mpSubTab==='chat'){
    html+='<div class="panel-title">💬 채팅</div>';
    html+='<div class="chat-box" id="chatBox">';
    if(chatData.length===0){
      html+='<div style="text-align:center;color:var(--text-dim);padding:20px;">아직 메시지가 없어요</div>';
    }
    chatData.forEach(m=>{
      const t=new Date(m.time*1000);
      const timeStr=t.getHours().toString().padStart(2,'0')+':'+t.getMinutes().toString().padStart(2,'0');
      html+=`<div class="chat-msg"><span class="chat-name">${m.from}</span> <span class="chat-text">${escapeHTML(m.msg)}</span><span class="chat-time">${timeStr}</span></div>`;
    });
    html+='</div>';
    html+=`<div class="chat-input-row">
      <input class="chat-input" id="chatInput" placeholder="메시지 입력..." maxlength="100" onkeydown="if(event.key==='Enter')sendChat()">
      <button class="chat-send" onclick="sendChat()">전송</button>
    </div>`;
  }

  if(mpSubTab==='arena'){
    html+=renderArena();
  } else if(mpSubTab==='guild'){
    html+=renderGuild();
  } else if(mpSubTab==='worldboss'){
    html+=renderWorldBoss();
  } else if(mpSubTab==='market'){
    html+=renderMarket();
  }

  p.innerHTML=html;

  // Auto scroll chat
  if(mpSubTab==='chat'){
    const box=document.getElementById('chatBox');
    if(box)box.scrollTop=box.scrollHeight;
  }
}

// Switch sub-tab (handles auto-refresh timer for world boss)
function switchMpTab(t){
  mpSubTab=t;
  // clear world boss timer when leaving
  if(wbRefreshTimer){clearInterval(wbRefreshTimer);wbRefreshTimer=null;}
  if(t==='arena'){
    if(mpData.arena.opponents.length===0)fetchArenaOpponents();
  } else if(t==='guild'){
    fetchGuildList();
    if(mpData.guild.id)fetchMyGuildInfo();
  } else if(t==='worldboss'){
    fetchWorldBoss();
    wbRefreshTimer=setInterval(()=>{
      if(currentTab==='mp'&&mpSubTab==='worldboss')fetchWorldBoss();
    },5000);
  } else if(t==='market'){
    fetchMarket();
  }
  renderMP();
}

function renderArena(){
  const a=mpData.arena;
  const canBattle=Date.now()>=a.lastBattle+30000;
  const cdLeft=Math.max(0,Math.ceil((a.lastBattle+30000-Date.now())/1000));
  let h=`<div class="panel-title">🥊 아레나</div>
  <div class="arena-header">
    <div class="arena-stat"><div class="arena-stat-val">${a.rating}</div><div class="arena-stat-label">레이팅</div></div>
    <div class="arena-stat"><div class="arena-stat-val" style="color:var(--green);">${a.wins}승</div><div class="arena-stat-label">승</div></div>
    <div class="arena-stat"><div class="arena-stat-val" style="color:#ff8888;">${a.losses}패</div><div class="arena-stat-label">패</div></div>
    <div class="arena-stat"><div class="arena-stat-val" style="color:var(--green);">${fmt(getCombatPower())}</div><div class="arena-stat-label">내 전투력</div></div>
  </div>
  <div class="arena-actions">
    <button class="arena-btn" onclick="fetchArenaOpponents()">🔎 상대 찾기</button>
    <button class="arena-btn" onclick="toggleArenaRanking()">🏆 ${a.showRanking?'상대 보기':'랭킹 보기'}</button>
  </div>`;
  if(!canBattle){
    h+=`<div style="text-align:center;color:var(--gold);font-size:11px;margin-bottom:8px;">쿨다운 ${cdLeft}초</div>`;
  }
  if(a.showRanking){
    h+='<div style="padding:0 10px;">';
    if(a.ranking.length===0){
      h+='<div style="text-align:center;color:var(--text-dim);padding:20px;">랭킹이 없어요</div>';
    }
    a.ranking.forEach((r,i)=>{
      const isMe=r.pid===myPid;
      const rc=i===0?'gold':i===1?'silver':i===2?'bronze':'normal';
      h+=`<div class="rank-card ${isMe?'me':''}" style="margin:4px 0;cursor:default;">
        <div class="rank-num ${rc}">${i+1}</div>
        <div class="rank-info">
          <div class="rank-name">${r.nickname}${isMe?' (나)':''}</div>
          <div class="rank-stats">전투력: ${fmt(r.power||0)}</div>
        </div>
        <div class="rank-lumen" style="color:var(--purple);">${r.rating}</div>
      </div>`;
    });
    h+='</div>';
  } else {
    if(a.opponents.length===0){
      h+='<div style="text-align:center;color:var(--text-dim);padding:20px;">상대를 찾아주세요</div>';
    } else {
      a.opponents.forEach(o=>{
        h+=`<div class="arena-card">
          <div class="arena-info">
            <div class="arena-name">${escapeHTML(o.nickname||'?')}<span class="arena-rating">⚔${o.rating||1000}</span></div>
            <div class="arena-sub">전투력 <span class="arena-power">${fmt(o.power||0)}</span></div>
          </div>
          <button class="arena-fight-btn" onclick="doArenaBattle('${o.pid}')" ${canBattle?'':'disabled'}>전투</button>
        </div>`;
      });
    }
  }
  return h;
}
function fetchArenaOpponents(){
  if(!myPid)return;
  mpData.arena.showRanking=false;
  fetch('/api/arena/opponents?pid='+myPid).then(r=>r.json()).then(d=>{
    mpData.arena.opponents=d.opponents||[];
    if(d.rating!==undefined)mpData.arena.rating=d.rating;
    if(d.wins!==undefined)mpData.arena.wins=d.wins;
    if(d.losses!==undefined)mpData.arena.losses=d.losses;
    if(currentTab==='mp'&&mpSubTab==='arena')renderMP();
  }).catch(()=>showToast('상대 찾기 실패'));
}
function toggleArenaRanking(){
  mpData.arena.showRanking=!mpData.arena.showRanking;
  if(mpData.arena.showRanking){
    fetch('/api/arena/ranking').then(r=>r.json()).then(d=>{
      mpData.arena.ranking=d.ranking||[];
      if(currentTab==='mp'&&mpSubTab==='arena')renderMP();
    }).catch(()=>{});
  }
  renderMP();
}
function doArenaBattle(oppPid){
  const a=mpData.arena;
  if(Date.now()<a.lastBattle+30000){showToast('쿨다운 중');return;}
  fetch('/api/arena/battle',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({pid:myPid,opponent_pid:oppPid})}).then(r=>r.json()).then(d=>{
    if(d.error){showToast(d.error);return;}
    a.lastBattle=Date.now();
    const won=d.winner_pid===myPid;
    if(won)a.wins++;else a.losses++;
    if(d.rating_change!==undefined)a.rating+=d.rating_change;
    showArenaBattle(d,won);
    // Remove used opponent
    a.opponents=a.opponents.filter(o=>o.pid!==oppPid);
    renderMP();
  }).catch(()=>showToast('전투 실패'));
}
function showArenaBattle(d,won){
  const box=document.getElementById('arenaBattleBox');
  const opp=mpData.arena.opponents.find(o=>o.pid!==myPid)||{nickname:'상대'};
  let oppName=opp.nickname||'상대';
  // Try to find from last opponents list
  for(const o of mpData.arena.opponents){if(o.pid===d.winner_pid||o.pid===(won?null:d.winner_pid)){oppName=o.nickname;break;}}
  let h=`<div class="arena-battle-title">🥊 전투 결과</div>
  <div class="arena-vs">
    <div class="arena-fighter"><div class="name">${escapeHTML(myNickname)}</div><div class="pw">${fmt(d.my_power||0)}</div></div>
    <div class="arena-vs-icon">VS</div>
    <div class="arena-fighter"><div class="name">${escapeHTML(oppName)}</div><div class="pw">${fmt(d.opp_power||0)}</div></div>
  </div>
  <div class="arena-log">`;
  const log=d.log||['전투 기록이 없습니다'];
  log.forEach(l=>{h+=`<div>${escapeHTML(l)}</div>`;});
  h+=`</div>
  <div class="arena-result ${won?'win':'lose'}">${won?'🎉 승리!':'😢 패배...'} (${d.rating_change>=0?'+':''}${d.rating_change||0})</div>
  <button class="gift-cancel" style="width:100%;padding:10px;" onclick="closeArenaBattle()">닫기</button>`;
  box.innerHTML=h;
  document.getElementById('arenaBattle').classList.add('show');
}
function closeArenaBattle(){document.getElementById('arenaBattle').classList.remove('show');}

function renderGuild(){
  const g=mpData.guild;
  let h='<div class="panel-title">🏰 길드</div>';
  if(g.id&&g.info){
    const gi=g.info;
    const lvExp=gi.exp||0, lvNext=gi.expNext||((gi.level||1)*10000);
    const pct=Math.min(100,(lvExp/lvNext)*100);
    h+=`<div class="guild-box">
      <div class="guild-name">${escapeHTML(gi.name||'')} <span style="color:var(--green);font-size:12px;">Lv.${gi.level||1}</span></div>
      ${gi.description?`<div style="font-size:11px;color:var(--text-dim);margin-bottom:4px;">${escapeHTML(gi.description)}</div>`:''}
      <div class="guild-level-bar"><div class="guild-level-fill" style="width:${pct}%;"></div></div>
      <div class="guild-stat">경험치: ${fmt(lvExp)} / ${fmt(lvNext)}</div>
      <div class="guild-stat">멤버: ${(gi.members||[]).length}명</div>
      <div class="guild-contrib" style="margin-top:10px;">
        <input type="number" id="donateAmt" value="10000" min="1" style="width:100px;background:var(--card);border:1px solid var(--border);color:var(--text);padding:6px;border-radius:4px;">
        <button class="qc-claim" onclick="donateGuild()">기부하기</button>
        <button class="qc-claim" style="background:#aa3333;color:#fff;margin-left:4px;" onclick="leaveGuildNew()">탈퇴</button>
      </div>
      <div style="font-size:11px;color:var(--text-dim);margin-top:10px;margin-bottom:4px;">멤버 (${(gi.members||[]).length})</div>
      <div class="guild-members">`;
    (gi.members||[]).forEach(m=>{
      h+=`<div class="guild-member-row">
        <span class="${m.online?'online-dot':'offline-dot'}"></span>
        <span class="mname">${escapeHTML(m.nickname||'?')}</span>
        <span class="mpower">⚔${fmt(m.power||0)}</span>
      </div>`;
    });
    h+='</div></div>';
  } else {
    // Not in guild
    if(g.showList){
      h+=`<div style="padding:0 10px 8px;">
        <button class="arena-btn" onclick="mpData.guild.showList=false;renderMP();">← 뒤로</button>
      </div>`;
      h+='<div style="font-size:12px;color:var(--text-dim);padding:0 10px 8px;">길드 목록</div>';
      if(g.list.length===0){
        h+='<div style="text-align:center;color:var(--text-dim);padding:20px;">길드가 없어요</div>';
      }
      g.list.forEach(gd=>{
        h+=`<div class="guild-card">
          <div class="gc-info">
            <div class="gc-name">${escapeHTML(gd.name||'')} <span style="color:var(--green);font-size:11px;">Lv.${gd.level||1}</span></div>
            <div class="gc-desc">${escapeHTML(gd.description||'')}</div>
            <div style="font-size:10px;color:var(--text-dim);">멤버 ${gd.memberCount||0}명</div>
          </div>
          <button class="market-btn buy" onclick="joinGuildNew('${gd.id}')">가입</button>
        </div>`;
      });
    } else {
      h+=`<div class="guild-form">
        <div style="font-family:'Do Hyeon';font-size:14px;color:var(--gold);margin-bottom:6px;">🏰 길드 만들기</div>
        <input type="text" id="guildNameInput" placeholder="길드 이름 (최대 12자)" maxlength="12">
        <textarea id="guildDescInput" placeholder="길드 소개 (선택)" rows="2" maxlength="80"></textarea>
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <div style="font-size:11px;color:var(--text-dim);">비용: <span style="color:var(--gold);font-weight:900;">10,000 루멘</span></div>
          <button class="qc-claim" onclick="createGuildNew()">생성</button>
        </div>
      </div>
      <div style="padding:0 10px;">
        <button class="arena-btn" onclick="mpData.guild.showList=true;fetchGuildList();renderMP();">📋 길드 목록 보기</button>
      </div>
      <div style="text-align:center;color:var(--text-dim);padding:20px 10px;">아직 길드에 가입하지 않았어요</div>`;
    }
  }
  return h;
}
function fetchGuildList(){
  const url='/api/guild/list'+(myPid?'?pid='+encodeURIComponent(myPid):'');
  fetch(url).then(r=>r.json()).then(d=>{
    mpData.guild.list=d.guilds||[];
    // Auto-detect my guild from server membership lookup
    if(d.myGuildId){
      mpData.guild.id=d.myGuildId;
      fetchMyGuildInfo();
    } else if(d.myGuildId===null && mpData.guild.id){
      // Server says I'm not in a guild — clear local state
      mpData.guild.id=null;
      mpData.guild.info=null;
    }
    if(currentTab==='mp'&&mpSubTab==='guild')renderMP();
  }).catch(()=>{});
}
function fetchMyGuildInfo(){
  if(!mpData.guild.id)return;
  fetch('/api/guild/info?id='+mpData.guild.id).then(r=>r.json()).then(d=>{
    if(d&&!d.error){
      mpData.guild.info=d;
      if(currentTab==='mp'&&mpSubTab==='guild')renderMP();
    } else {
      mpData.guild.id=null;mpData.guild.info=null;
    }
  }).catch(()=>{});
}
function createGuildNew(){
  const name=document.getElementById('guildNameInput')?.value?.trim();
  const desc=document.getElementById('guildDescInput')?.value?.trim()||'';
  if(!name){showToast('길드 이름을 입력하세요');return;}
  if(state.lumen<10000){showToast('루멘 부족 (10,000 필요)');return;}
  fetch('/api/guild/create',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({pid:myPid,name,description:desc})}).then(r=>r.json()).then(d=>{
    if(d.ok||d.guildId||d.id){
      state.lumen-=10000;updateTopBar();saveGame();
      showToast('🏰 길드 생성 완료!');
      mpData.guild.id=d.guildId||d.id;
      fetchMyGuildInfo();
    } else showToast(d.error||'생성 실패');
  }).catch(()=>showToast('생성 실패'));
}
function joinGuildNew(gid){
  fetch('/api/guild/join',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({pid:myPid,guild_id:gid})}).then(r=>r.json()).then(d=>{
    if(d.ok||d.success){
      showToast('길드에 가입했습니다!');
      mpData.guild.id=gid;mpData.guild.showList=false;
      fetchMyGuildInfo();
    } else showToast(d.error||'가입 실패');
  }).catch(()=>showToast('가입 실패'));
}
function donateGuild(){
  const amt=parseInt(document.getElementById('donateAmt')?.value)||0;
  if(amt<=0){showToast('금액을 입력하세요');return;}
  if(state.lumen<amt){showToast('루멘 부족');return;}
  fetch('/api/guild/donate',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({pid:myPid,amount:amt})}).then(r=>r.json()).then(d=>{
    if(d.ok||d.success){
      state.lumen-=amt;updateTopBar();saveGame();
      showToast('💰 기부 완료! +'+fmt(amt)+' 경험치');
      fetchMyGuildInfo();
    } else showToast(d.error||'실패');
  }).catch(()=>showToast('실패'));
}
function leaveGuildNew(){
  if(!confirm('정말 길드를 탈퇴하시겠습니까?'))return;
  fetch('/api/guild/leave',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({pid:myPid})}).then(r=>r.json()).then(d=>{
    mpData.guild.id=null;mpData.guild.info=null;
    showToast('길드를 탈퇴했습니다');
    renderMP();
  }).catch(()=>showToast('실패'));
}

// =====================================================
// WORLD BOSS
// =====================================================
function renderWorldBoss(){
  const wb=mpData.worldBoss;
  let h='<div class="panel-title">👹 월드 보스</div>';
  if(!wb){
    h+='<div style="text-align:center;color:var(--text-dim);padding:30px;">보스 정보를 불러오는 중...</div>';
    return h;
  }
  const curHp=wb.currentHp!==undefined?wb.currentHp:(wb.hp||0);
  const maxHp=wb.maxHp||1;
  const hpPct=Math.max(0,Math.min(100,(curHp/maxHp)*100));
  const timeLeft=Math.max(0,Math.floor(wb.timeLeft||0));
  const hrs=Math.floor(timeLeft/3600), mins=Math.floor((timeLeft%3600)/60), secs=timeLeft%60;
  const timeStr=`${hrs}시간 ${mins}분 ${secs}초`;
  const dead=curHp<=0;
  const lastAttack=wb.lastAttack||0;
  const canAttack=!dead&&Date.now()>=lastAttack+10000;
  const cd=Math.max(0,Math.ceil((lastAttack+10000-Date.now())/1000));
  h+=`<div class="boss-card">
    <div class="boss-emoji">${wb.emoji||'👹'}</div>
    <div class="boss-name">${escapeHTML(wb.name||'어둠의 지배자')}</div>
    <div class="boss-hp-bar">
      <div class="boss-hp-fill" style="width:${hpPct}%;"></div>
      <div class="boss-hp-text">${fmt(Math.max(0,curHp))} / ${fmt(maxHp)}</div>
    </div>
    <div class="boss-timer">⏱ 리셋까지: ${timeStr}</div>
    <div style="font-size:11px;color:var(--text-dim);margin-bottom:8px;">내 전투력: <span style="color:var(--green);font-weight:900;">${fmt(getCombatPower())}</span></div>
    <button class="boss-attack-btn" onclick="attackWorldBoss()" ${canAttack?'':'disabled'}>
      ${dead?'💀 처치됨':(canAttack?'⚔ 공격하기':`대기 ${cd}초`)}
    </button>
  </div>
  <div style="font-size:12px;color:var(--gold);padding:0 10px 6px;font-family:'Do Hyeon';">🏆 기여도 TOP 10</div>`;
  const damagers=wb.topDamage||wb.damagers||[];
  if(damagers.length===0){
    h+='<div style="text-align:center;color:var(--text-dim);padding:10px;font-size:11px;">아직 공격자가 없어요</div>';
  }
  damagers.forEach((d,i)=>{
    const isMe=d.pid===myPid;
    h+=`<div class="boss-damager ${isMe?'me':''}">
      <div class="drank">#${i+1}</div>
      <div class="dname">${escapeHTML(d.nickname||'?')}${isMe?' (나)':''}</div>
      <div class="ddmg">${fmt(d.damage||0)}</div>
    </div>`;
  });
  return h;
}
function fetchWorldBoss(){
  fetch('/api/worldboss').then(r=>r.json()).then(d=>{
    const prev=mpData.worldBoss;
    mpData.worldBoss=Object.assign({},d,{lastAttack:prev?prev.lastAttack:0});
    const prevHp=prev?(prev.currentHp!==undefined?prev.currentHp:prev.hp):null;
    const newHp=d.currentHp!==undefined?d.currentHp:d.hp;
    if(prevHp!==null&&prevHp>0&&newHp<=0){
      showBossKillOverlay();
    }
    if(currentTab==='mp'&&mpSubTab==='worldboss')renderMP();
  }).catch(()=>{});
}
function attackWorldBoss(){
  const wb=mpData.worldBoss;
  const curHp=wb?(wb.currentHp!==undefined?wb.currentHp:wb.hp):0;
  if(!wb||curHp<=0){showToast('보스가 없습니다');return;}
  if(Date.now()<(wb.lastAttack||0)+10000){showToast('쿨다운 중');return;}
  const dmg=getCombatPower();
  wb.lastAttack=Date.now();
  fetch('/api/worldboss/attack',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({pid:myPid,damage:dmg})}).then(r=>r.json()).then(d=>{
    if(d.error){showToast(d.error);return;}
    showToast('⚔ '+fmt(dmg)+' 데미지!');
    fetchWorldBoss();
  }).catch(()=>showToast('공격 실패'));
  renderMP();
}
function showBossKillOverlay(){
  const div=document.createElement('div');
  div.className='gift-notif';
  div.style.color='var(--green)';
  div.style.borderColor='var(--green)';
  div.textContent='🎉 월드 보스 처치! 보상이 지급됩니다!';
  document.body.appendChild(div);
  setTimeout(()=>div.remove(),3500);
}
