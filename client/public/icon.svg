<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27"/>
      <stop offset="50%" style="stop-color:#1a1040"/>
      <stop offset="100%" style="stop-color:#0d1535"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8dcff"/>
      <stop offset="100%" style="stop-color:#a0b0ff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="80" cy="100" r="2" fill="#fff" opacity="0.6"/>
  <circle cx="420" cy="80" r="1.5" fill="#fff" opacity="0.5"/>
  <circle cx="150" cy="400" r="1.5" fill="#fff" opacity="0.4"/>
  <circle cx="380" cy="350" r="2" fill="#fff" opacity="0.6"/>
  <circle cx="100" cy="300" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="350" cy="150" r="1.5" fill="#fff" opacity="0.4"/>
  <circle cx="450" cy="420" r="1" fill="#fff" opacity="0.5"/>
  <!-- Main star sparkle -->
  <g transform="translate(256,220)">
    <!-- Vertical line -->
    <rect x="-4" y="-60" width="8" height="120" rx="4" fill="url(#glow)"/>
    <!-- Horizontal line -->
    <rect x="-60" y="-4" width="120" height="8" rx="4" fill="url(#glow)"/>
    <!-- Diagonal 1 -->
    <rect x="-3" y="-40" width="6" height="80" rx="3" fill="url(#glow)" opacity="0.7" transform="rotate(45)"/>
    <!-- Diagonal 2 -->
    <rect x="-3" y="-40" width="6" height="80" rx="3" fill="url(#glow)" opacity="0.7" transform="rotate(-45)"/>
    <!-- Center glow -->
    <circle cx="0" cy="0" r="10" fill="#fff" opacity="0.9"/>
    <circle cx="0" cy="0" r="20" fill="#c8dcff" opacity="0.3"/>
  </g>
  <!-- Small sparkle -->
  <g transform="translate(340,160) scale(0.4)">
    <rect x="-4" y="-40" width="8" height="80" rx="4" fill="url(#glow)" opacity="0.6"/>
    <rect x="-40" y="-4" width="80" height="8" rx="4" fill="url(#glow)" opacity="0.6"/>
    <circle cx="0" cy="0" r="6" fill="#fff" opacity="0.8"/>
  </g>
  <!-- Text -->
  <text x="256" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="300" letter-spacing="8" fill="#c8dcff">IMPARTER</text>
</svg>
